# OpenTSI Dataset Metadata
# ========================
# This file describes your dataset for the OpenTSI ecosystem.
# Fill in the fields below and run deloRean::validate_metadata() to check.
#
# Key pattern: country.provider.dataset.dimension.variable.unit
# Example: ch.adecco.sjmi.idx_type.sch.idx

# Dataset identity (required)
# These form the first three segments of every key
country: "ch"
provider: "fso"
dataset: "es_rs"

# Dataset title (required)
# At minimum, provide English. Add other languages as needed.
title:
  en: "Employment statistics by residence status"
  de: "Erwerbstätigenstatistik nach Aufenthaltsstatus"
  fr: "Statistique de la population active occupée"
  it: "Statistica delle persone occupate"

# Data source name (required)
source_name:
  en: "Federal Statistical Office FSO"
  de: "Bundesamt für Statistik BFS"
  fr: "Office fédéral de la statistique OFS"
  it: "Ufficio federale di statistica UFS"

# URL to original data source (required)
source_url: "https://www.bfs.admin.ch/bfs/de/home/statistiken/arbeit-erwerb/erhebungen/ets.html"

# Data frequency (required)
# D = daily, W = weekly, M = monthly, Q = quarterly, Y = yearly, I = irregular
dataset_frequency: "Q"

# Units of measurement
# Use "all" if uniform across variables, or specify per variable key
units:
  all:
    en: "Employees"
    de: "Angestellte"
    fr: "Emplois"
    it: "Addetti"

# Aggregation method for temporal aggregation
# Valid values: mean, sum, last, first
aggregate:
  all: "mean"

# Dimension order (left to right in the key, after country.provider.dataset)
dim_order:
  - "residence"
  - "sex"

# Hierarchical structure of dimensions
# Nest dimensions according to your key structure
hierarchy:
  residence:
    tot:
      ch: ~
      frgn:
        sd: ~
        res: ~
        sw: ~
        bc: ~
        sst: ~
        oth: ~
  sex:
    tot:
      m: ~
      f: ~

# Human-readable labels for dimensions and their values
# dimnames: labels for dimension names
# <dimension_name>: labels for values within that dimension
labels:
  dimnames:
    residence:
      en: "Residence status"
      de: "Aufenthaltsstatus"
      fr: "Catégorie d'autorisation de résidence"
      it: "Stato di residenza"
    sex:
      en: "Sex"
      de: "Geschlecht"
      fr: "Sexe"
      it: "Sesso"
  residence:
    bc:
      en: "Cross-border commuters"
      de: "Grenzgänger/innen"
      fr: "Frontaliers"
      it: "Frontalieri"
    ch:
      en: "Swiss nationals"
      de: "Schweizer/innen"
      fr: "Suisses et Suissesses"
      it: "Svizzeri e svizzere"
    frgn:
      en: "Foreign nationals"
      de: "Ausländer/innen"
      fr: "Etrangers et étrangères"
      it: "Stranieri e straniere"
    oth:
      en: "Other foreign nationals"
      de: "Übrige Ausländer/innen"
      fr: "Autres étrangers"
      it: "Altri stranieri"
    res:
      en: "Residence permit holders"
      de: "Aufenthalter/innen"
      fr: "Autorisation de séjour"
      it: "Titolari di permesso di dimora"
    sd:
      en: "Settled (permanent residence)"
      de: "Niedergelassene"
      fr: "Autorisation d'établissement"
      it: "Domiciliati"
    sst:
      en: "Short-term permit holders"
      de: "Kurzaufenthalter/innen"
      fr: "Autorisation de courte durée"
      it: "Dimoranti temporanei"
    sw:
      en: "Seasonal workers"
      de: "Saisonniers"
      fr: "Saisonniers"
      it: "Stagionali"
    tot:
      en: "Total employed"
      de: "Erwerbstätige, Total"
      fr: "Personnes actives occupées, total"
      it: "Occupati, totale"
  sex:
    f:
      en: "Women"
      de: "Frauen"
      fr: "Femmes"
      it: "Donne"
    m:
      en: "Men"
      de: "Männer"
      fr: "Hommes"
      it: "Uomini"
    tot:
      en: "Total"
      de: "Total"
      fr: "Total"
      it: "Totale"

# update checksum is empty in the beginning
update_checksum: ""
